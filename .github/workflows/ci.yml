name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run full CI suite
        run: pnpm build && pnpm astro check && npx tsx scripts/eval/validate-frontmatter.ts && npx tsx scripts/eval/brand-check.ts && npx tsx scripts/eval/a11y-check.ts && npx tsx scripts/eval/seo-check.ts && npx tsx scripts/eval/perf-check.ts && npx tsx scripts/eval/consistency-check.ts
