name: Auto Merge

on:
  pull_request_target:
    types: [labeled, unlabeled, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable:
    if: >-
      github.event.pull_request.draft == false &&
      contains(github.event.pull_request.labels.*.name, 'automerge')
    runs-on: ubuntu-latest
    steps:
      - name: Queue squash merge after required checks pass
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge "$PR_URL" --auto --squash --delete-branch

  disable:
    if: >-
      github.event.action == 'unlabeled' &&
      github.event.label.name == 'automerge'
    runs-on: ubuntu-latest
    steps:
      - name: Cancel queued automatic merge
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge "$PR_URL" --disable-auto
